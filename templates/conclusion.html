<!DOCTYPE html>
<html>
<head>
<title>Conclusion - Electricity Consumption</title>

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:#f4f6fb;
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 80px;
background:white;
box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

.logo{
font-size:22px;
font-weight:bold;
color:#2f6fed;
}

nav a{
margin-left:25px;
text-decoration:none;
font-weight:600;
color:#444;
}

nav a:hover{
color:#2f6fed;
}


/* Title */

.title{
text-align:center;
margin-top:50px;
}

.title h1{
font-size:36px;
color:#2c3e50;
}

.title p{
color:#666;
margin-top:10px;
}


/* Cards */

.cards{
display:flex;
justify-content:center;
gap:40px;
margin-top:50px;
flex-wrap:wrap;
}

.card{
background:white;
padding:30px;
width:260px;
border-radius:12px;
text-align:center;
box-shadow:0px 5px 20px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card h2{
color:#2f6fed;
margin-bottom:10px;
}

.card p{
color:#555;
}


/* Chart Section */

.chart{
margin-top:60px;
text-align:center;
}

.chart img{
width:300px;
border-radius:10px;
box-shadow:0px 5px 15px rgba(0,0,0,0.1);
}
